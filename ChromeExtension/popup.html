<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Downloader</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="icon32.png" alt="Logo" class="logo-img">
      <span class="brand">Downloader</span>
    </div>
    <div class="header-actions">
      <label class="toggle-label">
        <input type="checkbox" id="currentTabOnly" checked>
        <span>Aba atual</span>
      </label>
      <button id="clearBtn" class="btn-icon" title="Limpar lista">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="toolbar">
    <div class="status-indicator">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Aguardando...</span>
    </div>
    <div class="filter-pills" id="filterPills">
      <button class="pill active" data-filter="all">Todos</button>
      <button class="pill" data-filter="M3U8">M3U8</button>
      <button class="pill" data-filter="MPD">MPD</button>
      <button class="pill" data-filter="MP4">MP4</button>
      <button class="pill" data-filter="Áudio">Áudio</button>
    </div>
    <span class="count-badge" id="mediaCount">0</span>
  </div>

  <div id="mediaList" class="media-list"></div>

  <script src="popup.js"></script>
</body>
</html>
