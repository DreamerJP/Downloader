<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="header-left">
      <img src="icon32.png" alt="" class="logo">
      <span class="brand">Downloader <small id="versionTag" style="opacity:0.5; font-weight:400; font-size:10px; margin-left:4px;"></small></span>
    </div>
    <div class="header-right">
      <label class="tab-toggle" title="Filtrar pela aba atual">
        <input type="checkbox" id="currentTabOnly" checked>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Aba atual</span>
      </label>
      <button id="clearBtn" class="icon-btn danger" title="Limpar lista">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 4h12M6 4V2.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5V4M5 4l.5 9.5h5L11 4"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="toolbar">
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Aguardando...</span>
    </div>
    <div class="filters" id="filterPills">
      <button class="chip active" data-filter="all">Todos</button>
      <button class="chip" data-filter="HLS">HLS</button>
      <button class="chip" data-filter="DASH">DASH</button>
      <button class="chip" data-filter="MP4">MP4</button>
      <button class="chip" data-filter="Áudio">Áudio</button>
    </div>
    <span class="counter" id="mediaCount">0</span>
  </div>

  <main id="mediaList"></main>

  <script src="version.js"></script>
  <script src="popup.js"></script>
</body>
</html>
